name: Android Release and Play Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    environment: RELEASE-PROD

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Restore google-services.json
        run: |
          if [ -f android/app/google-services.json ]; then
            echo "google-services.json ja presente no repositorio."
          elif [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            printf '%s' "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | tr -d '\r\n ' | base64 --decode > android/app/google-services.json
            echo "google-services.json restaurado via secret."
          else
            echo "::error::google-services.json ausente. Adicione o arquivo no repositorio ou secret GOOGLE_SERVICES_JSON_BASE64."
            exit 1
          fi

      - name: Restore and validate keystore
        run: |
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\r\n ' | base64 --decode > android/app/release-keystore.jks

          TYPE_FROM_SECRET="${{ secrets.KEYSTORE_TYPE }}"
          DETECTED_TYPE=""

          validate_keystore_type() {
            local candidate_type="$1"
            keytool -list \
              -keystore android/app/release-keystore.jks \
              -storetype "$candidate_type" \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" >/dev/null 2>&1
          }

          if [ -n "$TYPE_FROM_SECRET" ]; then
            if validate_keystore_type "$TYPE_FROM_SECRET"; then
              DETECTED_TYPE="$TYPE_FROM_SECRET"
            else
              echo "::error::KEYSTORE_TYPE informado ($TYPE_FROM_SECRET) nao corresponde ao arquivo ou senha do keystore."
              exit 1
            fi
          else
            for candidate in JKS PKCS12; do
              if validate_keystore_type "$candidate"; then
                DETECTED_TYPE="$candidate"
                break
              fi
            done
          fi

          if [ -z "$DETECTED_TYPE" ]; then
            echo "::error::Nao foi possivel ler o keystore. Verifique ANDROID_KEYSTORE_BASE64 e KEYSTORE_PASSWORD."
            exit 1
          fi

          echo "KEYSTORE_TYPE=$DETECTED_TYPE" >> "$GITHUB_ENV"
          echo "Keystore valido. Tipo detectado: $DETECTED_TYPE"

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=release-keystore.jks
          storeType=${KEYSTORE_TYPE}
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: flutter build apk --release --build-number ${{ github.run_number }}

      - name: Build release AAB
        run: flutter build appbundle --release --build-number ${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Generate Play release notes
        shell: bash
        run: |
          mkdir -p distribution/whatsnew

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "${{ github.event_name }}" = "push" ] && [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            NOTES="$(git log --pretty=format:'- %s' "$BEFORE..$AFTER" | head -n 8)"
          else
            NOTES="$(git log -1 --pretty=format:'- %s' "$AFTER")"
          fi

          if [ -z "$NOTES" ]; then
            NOTES="- Melhorias e correcoes gerais."
          fi

          {
            echo "O que mudou nesta versao:"
            echo "$NOTES"
          } > distribution/whatsnew/whatsnew-pt-BR

          python3 - <<'PY'
          from pathlib import Path

          path = Path("distribution/whatsnew/whatsnew-pt-BR")
          text = path.read_text(encoding="utf-8").strip()

          if len(text) > 500:
              text = text[:497].rstrip() + "..."

          path.write_text(text + "\n", encoding="utf-8")
          print(text)
          PY

      - name: Publish to Google Play (internal)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.cltapp
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          whatsNewDirectory: distribution/whatsnew
          tracks: internal
          status: draft
          changesNotSentForReview: true
